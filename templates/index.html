<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDW · Automated Data Warehouse</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="gradient-bg">
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-warehouse"></i>
                <span>Auto<span class="text-blue">DW</span></span>
            </div>
            
            <div class="nav-items">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/projects" class="nav-item">
                    <i class="fas fa-database"></i>
                    <span>Warehouse</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>

            <div class="system-status">
                <div class="status-indicator">
                    <span class="pulse"></span>
                    <span>System Online</span>
                </div>
                <div class="storage-info">
                    <div class="storage-bar">
                        <div class="storage-progress" style="width: 45%"></div>
                    </div>
                    <small>45% Storage Used</small>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                    <p>Welcome back, Data Architect</p>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search projects...">
                    </div>
                    <div class="profile">
                        <i class="fas fa-bell"></i>
                        <div class="avatar">
                            <img src="https://ui-avatars.com/api/?name=Data+Architect&background=0D8ABC&color=fff" alt="Profile">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Upload Area -->
            <div class="upload-section">
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="upload-glow"></div>
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <h3>Drop your CSV and PDF files here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="file-input" accept=".csv,.pdf" multiple onchange="uploadFiles(this.files)">
                    <div class="supported-formats">
                        <span class="format-badge">.csv</span>
                        <span class="format-badge">.pdf</span>
                        <span class="format-badge">.xlsx</span>
                        <span class="format-badge">.json</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="buildWarehouse()">
                        <i class="fas fa-cube"></i>
                        Build Warehouse
                    </button>
                    <button class="btn btn-secondary" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                </div>
            </div>

            <!-- Uploaded Files Section -->
            <div class="section-header">
                <h2><i class="fas fa-file-upload"></i> Uploaded Files</h2>
                <div class="section-filters">
                    <select class="filter-select">
                        <option>All Files</option>
                        <option>CSV Files</option>
                        <option>Excel Files</option>
                    </select>
                </div>
            </div>

            <div class="files-grid" id="files-grid">
                <!-- Dynamically populated -->
            </div>

            </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="/js/script.js"></script>
</body>
</html>
