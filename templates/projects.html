<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDW · Warehouse Projects</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }
        
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .project-card:hover::before {
            transform: scaleX(1);
        }
        
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 102, 255, 0.15);
            border-color: var(--accent-primary);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .project-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        
        .project-badge {
            background: var(--gradient-1);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .project-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .project-stats .stat {
            text-align: center;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        
        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .project-actions {
            display: flex;
            gap: 0.75rem;
        }
        
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        
        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--danger);
        }
        
        .error-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        /* Professional Layout Styles */
        .content-wrapper {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .header-left .page-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .header-left .page-subtitle {
            color: var(--text-tertiary);
            font-size: 0.9rem;
            margin-left: 2.5rem;
        }
        
        .header-right {
            display: flex;
            gap: 1rem;
        }
        
        .stats-overview {
            margin-bottom: 2rem;
        }
        
        .stats-overview .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .stats-overview .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }
        
        .stats-overview .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .stats-overview .stat-card.primary {
            border-color: var(--accent-primary);
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.1);
        }
        
        .stats-overview .stat-card.success {
            border-color: var(--success);
            box-shadow: 0 4px 20px rgba(0, 200, 83, 0.1);
        }
        
        .stats-overview .stat-card.info {
            border-color: var(--accent-secondary);
            box-shadow: 0 4px 20px rgba(0, 82, 204, 0.1);
        }
        
        .stats-overview .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .stats-overview .stat-info {
            flex: 1;
        }
        
        .stats-overview .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        
        .projects-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }
        
        .section-header {
            margin-bottom: 1.5rem;
        }
        
        .section-title h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        
        .section-subtitle {
            color: var(--text-tertiary);
            font-size: 0.9rem;
            margin-left: 1rem;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="gradient-bg">
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-warehouse"></i>
                <span>Auto<span class="text-blue">DW</span></span>
            </div>
            
            <div class="nav-items">
                <a href="/" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/projects" class="nav-item active">
                    <i class="fas fa-database"></i>
                    <span>Warehouse</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>

            <div class="system-status">
                <div class="status-indicator">
                    <span class="pulse"></span>
                    <span>System Online</span>
                </div>
                <div class="storage-info">
                    <div class="storage-bar">
                        <div class="storage-progress" style="width: 45%"></div>
                    </div>
                    <span>45% Storage Used</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- Page Header -->
                <header class="page-header">
                    <div class="header-left">
                        <div class="page-title">
                            <i class="fas fa-database"></i>
                            Warehouse Projects
                        </div>
                        <div class="page-subtitle">
                            Manage and explore your automated data warehouse projects
                        </div>
                    </div>
                    <div class="header-right">
                        <button class="btn btn-secondary" onclick="refreshProjects()">
                            <i class="fas fa-sync-alt"></i>
                            Refresh Data
                        </button>
                    </div>
                </header>

                <!-- Stats Overview -->
                <section class="stats-overview">
                    <div class="stats-grid">
                        <div class="stat-card primary">
                            <div class="stat-icon">
                                <i class="fas fa-folder-open"></i>
                            </div>
                            <div class="stat-info">
                                <div class="stat-number" id="total-projects">0</div>
                                <div class="stat-label">Total Projects</div>
                            </div>
                        </div>
                        
                        <div class="stat-card success">
                            <div class="stat-icon">
                                <i class="fas fa-table"></i>
                            </div>
                            <div class="stat-info">
                                <div class="stat-number" id="total-fact-tables">0</div>
                                <div class="stat-label">Fact Tables</div>
                            </div>
                        </div>
                        
                        <div class="stat-card info">
                            <div class="stat-icon">
                                <i class="fas fa-cubes"></i>
                            </div>
                            <div class="stat-info">
                                <div class="stat-number" id="total-dim-tables">0</div>
                                <div class="stat-label">Dimension Tables</div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Projects Section -->
                <section class="projects-section">
                    <div class="section-header">
                        <div class="section-title">
                            <h2>Projects Database</h2>
                            <span class="section-subtitle" id="project-count">0 projects</span>
                        </div>
                    </div>
                    
                    <div class="projects-container" id="projects-container">
                        <div class="loading-state">
                            <div class="loading-spinner"></div>
                            <p>Loading warehouse projects...</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        let projects = [];

        async function loadProjects() {
            console.log('Loading projects...');
            try {
                const response = await fetch('/api/projects');
                const data = await response.json();
                projects = data.value || data || [];
                console.log('Projects loaded:', projects.length);
                renderProjects();
                updateStats();
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projects-container').innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Projects</h3>
                        <p>Unable to load projects. Please try again.</p>
                        <button class="btn btn-primary" onclick="loadProjects()">
                            <i class="fas fa-redo"></i>
                            Try Again
                        </button>
                    </div>
                `;
            }
        }

        function renderProjects() {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <h3>No Projects Yet</h3>
                        <p>Start by uploading files and building your first data warehouse project.</p>
                        <a href="/" class="btn btn-primary">
                            <i class="fas fa-plus"></i>
                            Create First Project
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="projects-grid">
                    ${projects.map((project, index) => `
                        <div class="project-card" style="--index: ${index}">
                            <div class="project-header">
                                <div class="project-title">${project.project_name}</div>
                                <span class="project-badge">PROJECT</span>
                            </div>
                            
                            <div class="project-stats">
                                <div class="stat">
                                    <span class="stat-value">${project.file_count || 0}</span>
                                    <span class="stat-label">Files</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-value">${(project.fact_tables || []).length + (project.dimension_tables || []).length}</span>
                                    <span class="stat-label">Tables</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-value">${project.total_size_mb || 0}MB</span>
                                    <span class="stat-label">Size</span>
                                </div>
                            </div>
                            
                            <div class="project-actions">
                                <a href="/download/${project.project_id}" class="btn btn-primary btn-sm">
                                    <i class="fas fa-eye"></i>
                                    View
                                </a>
                                <button class="btn btn-danger btn-sm" onclick="deleteProject('${project.project_id}')">
                                    <i class="fas fa-trash"></i>
                                    Delete
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function updateStats() {
            const totalProjects = document.getElementById('total-projects');
            const totalFactTables = document.getElementById('total-fact-tables');
            const totalDimTables = document.getElementById('total-dim-tables');
            const projectCount = document.getElementById('project-count');
            
            if (totalProjects) totalProjects.textContent = projects.length;
            if (projectCount) projectCount.textContent = `${projects.length} projects`;
            
            let factCount = 0;
            let dimCount = 0;
            
            projects.forEach(project => {
                factCount += project.fact_tables ? project.fact_tables.length : 0;
                dimCount += project.dimension_tables ? project.dimension_tables.length : 0;
            });
            
            if (totalFactTables) totalFactTables.textContent = factCount;
            if (totalDimTables) totalDimTables.textContent = dimCount;
        }

        function refreshProjects() {
            loadProjects();
        }

        function deleteProject(projectId) {
            // Create and show a simple centered confirmation dialog
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: var(--bg-card);
                border: 1px solid var(--border-color);
                border-radius: 16px;
                padding: 2rem;
                z-index: 999999;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
                min-width: 400px;
                text-align: center;
            `;
            
            modal.innerHTML = `
                <h3 style="color: var(--text-primary); margin-bottom: 1rem;">Delete Project</h3>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Are you sure you want to delete this project? This action cannot be undone.</p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button onclick="this.closest('div').remove(); document.querySelector('.modal-backdrop').remove()" style="
                        background: var(--bg-secondary);
                        color: var(--text-primary);
                        border: 1px solid var(--border-color);
                        padding: 0.75rem 1.5rem;
                        border-radius: 8px;
                        cursor: pointer;
                    ">Cancel</button>
                    <button onclick="confirmDelete('${projectId}')" style="
                        background: var(--danger);
                        color: white;
                        border: none;
                        padding: 0.75rem 1.5rem;
                        border-radius: 8px;
                        cursor: pointer;
                    ">Delete</button>
                </div>
            `;
            
            // Add backdrop
            const backdrop = document.createElement('div');
            backdrop.className = 'modal-backdrop';
            backdrop.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999998;
            `;
            backdrop.onclick = () => {
                modal.remove();
                backdrop.remove();
            };
            
            document.body.appendChild(backdrop);
            document.body.appendChild(modal);
        }

        function confirmDelete(projectId) {
            fetch(`/api/projects/${projectId}`, { method: 'DELETE' })
                .then(() => {
                    // Close modal
                    document.querySelector('.modal-backdrop').remove();
                    document.querySelector('[style*="position: fixed"]').remove();
                    // Reload projects
                    loadProjects();
                });
        }

        // Load projects when page loads
        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
